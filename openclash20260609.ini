[custom]
; ====== OpenClash 终极优化订阅模板（Fake-IP + 防 DNS 泄漏 + 5分钟自动测速）======
; 适用于机场订阅转换，保留原始节点名与关键字，仅优化配置逻辑
; ========================================================================

enable_rule_generator=true
overwrite_original_rules=true

# ====================== DNS 设置（Fake-IP 模式，防泄漏最优解）======================
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.home'
    - 'stun.*'
    - 'time.*'
    - 'localhost'
    - '+.apple.com'
    - '+.crashlytics.com'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.battlenet.com.cn'
    - '+.qq.com'
    - '+.weixin.qq.com'
    - '+.tencent.com'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114
  nameserver:
    - https://dns.alidns.com/dns-query#DIRECT
    - https://doh.pub/dns-query#DIRECT
  fallback:
    - https://1.1.1.1/dns-query#PROXY
    - https://8.8.8.8/dns-query#PROXY
  fallback-filter:
    geoip: false
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32

# ====================== 规则集（按优先级从高到低）======================
# 币圈专用（最优先）
ruleset=💰 币交易所,https://raw.githubusercontent.com/arb989822/bnok/refs/heads/main/BNOK.list
ruleset=💸 提法币,https://raw.githubusercontent.com/arb989822/bnok/refs/heads/main/cex.list

# 油管专线
ruleset=📹 油管视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list

# 广告与净化
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🍃 应用净化,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

# 常规规则
